<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Swabodhini Autism Centre</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar" id="navbar">
        <a href="/landing" class="nav-brand">
            <div class="logo">S</div>
            <h1>Swabodhini Autism Centre</h1>
        </a>
        <button class="nav-menu-btn" id="menuBtn">☰</button>
        <div class="nav-links" id="navLinks">
            <a href="/landing" class="nav-link">🏠 Home</a>
            <a href="/orders" class="nav-link active">📦 My Orders</a>
            <a href="/cart" class="nav-link">🛒 My Cart <span class="cart-badge" id="cartBadge">0</span></a>
            <button class="nav-link" id="logoutBtn">🚪 Logout</button>
        </div>
    </nav>
    <div class="main-content">
        <div class="container cart-page">
            <h2>📦 My Orders</h2>
            <div class="loading" id="loadingSpinner">
                <div class="spinner"></div>
            </div>
            <div id="ordersContent"></div>
            <div class="cart-empty" id="noOrders" style="display:none;">
                <div class="icon">📦</div>
                <h3>No orders yet</h3>
                <p>Start shopping to see your orders here</p>
                <a href="/landing" class="btn btn-primary" style="margin-top:1rem;display:inline-flex;">Browse
                    Products</a>
            </div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="/js/common.js"></script>
    <script src="/js/orders.js"></script>
</body>

</html>
