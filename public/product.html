<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | Swabodhini Autism Centre</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ── Recommendations Section ── */
        .recommendations-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border, #e5e7eb);
        }

        .recommendations-section h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            color: var(--text-primary, #111827);
        }

        .recommendations-section h2 span {
            font-size: 1.1rem;
            margin-right: 0.4rem;
        }

        .rec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }

        .rec-card {
            background: var(--card-bg, #fff);
            border: 1px solid var(--border, #e5e7eb);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .rec-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.10);
        }

        .rec-card-img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            background: #f3f4f6;
        }

        .rec-card-body {
            padding: 0.75rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .rec-card-category {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--primary, #6c63ff);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .rec-card-name {
            font-size: 0.88rem;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .rec-card-price {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary, #6c63ff);
            margin-top: auto;
            padding-top: 0.35rem;
        }

        .rec-loading {
            display: flex;
            gap: 1rem;
        }

        .rec-skeleton {
            flex: 1;
            min-width: 140px;
            height: 200px;
            border-radius: 12px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 480px) {
            .rec-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <nav class="navbar" id="navbar">
        <a href="/landing" class="nav-brand">
            <div class="logo">S</div>
            <h1>Swabodhini Autism Centre</h1>
        </a>
        <button class="nav-menu-btn" id="menuBtn">☰</button>
        <div class="nav-links" id="navLinks">
            <a href="/landing" class="nav-link">🏠 Home</a>
            <a href="/orders" class="nav-link">📦 My Orders</a>
            <a href="/cart" class="nav-link">🛒 My Cart <span class="cart-badge" id="cartBadge">0</span></a>
            <button class="nav-link" id="logoutBtn">🚪 Logout</button>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div class="loading" id="loadingSpinner">
                <div class="spinner"></div>
            </div>

            <div class="product-detail" id="productDetail" style="display:none;">
                <div class="product-detail-img"><img id="productImage" src="" alt="Product"></div>
                <div class="product-detail-info">
                    <span class="category-badge" id="productCategory"></span>
                    <h1 id="productName"></h1>
                    <div class="price" id="productPrice"></div>
                    <div class="stock" id="productStock"></div>
                    <div class="description" id="productDescription"></div>
                    <div class="product-actions">
                        <button class="btn btn-add-cart" id="addToCartBtn">🛒 Add to Cart</button>
                        <button class="btn btn-buy-now" id="buyNowBtn">⚡ Buy Now</button>
                    </div>
                </div>
            </div>

            <!-- Recommendations Section -->
            <div class="recommendations-section" id="recommendationsSection" style="display:none;">
                <h2><span>✨</span> You Might Also Like</h2>
                <!-- Skeleton shown while loading -->
                <div class="rec-loading" id="recLoading">
                    <div class="rec-skeleton"></div>
                    <div class="rec-skeleton"></div>
                    <div class="rec-skeleton"></div>
                    <div class="rec-skeleton"></div>
                </div>
                <div class="rec-grid" id="recGrid" style="display:none;"></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="/js/common.js"></script>
    <script src="/js/product.js"></script>
    <script src="/js/chatbot.js"></script>
</body>

</html>
